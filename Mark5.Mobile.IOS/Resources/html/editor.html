<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, minimum-scale=1, maximum-scale=1, user-scalable=no" />
    <meta charset="utf-8" />
    <style type="text/css">
        html, body {
            height: 100%;
            width: 100%;
        }
        body {
            margin: 0;
        }
        #editor {
            padding: 10px;
            font-family: arial;
            font-size: 12pt;
        }
    </style>
</head>
<body>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            window.webkit.messageHandlers.domloaded.postMessage({
                domloaded: true
            });
        });
    </script>
    <div id="editor" contenteditable="true"></div>
    <script>
        window.onload = function() {
            window.webkit.messageHandlers.loaded.postMessage({
                loaded: true
            });
        };
    </script>
    <script>
        window.onresize = function() {
            window.webkit.messageHandlers.resized.postMessage({
                resized: true
            });
        };
    </script>
    <script>
        var observer = new MutationObserver(function(mutations) {
            window.webkit.messageHandlers.mutated.postMessage({
                mutated: true
            });
        });
        observer.observe(document.querySelector('#editor'), {
            attributes: true,
            childList: true,
            characterData: true,
            subtree: true
        });
    </script>
    <script>
        document.addEventListener("keypress", function(e) {
            if (e.which == 13) {
                window.webkit.messageHandlers.enterpressed.postMessage({
                    enterpressed: true
                });
            }
        })
    </script>
</body>
</html>
