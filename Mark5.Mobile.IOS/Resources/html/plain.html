<!DOCTYPE html>
<html>
<head>
    <meta id="viewport" name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta charset="utf-8" />
    <style type="text/css">
        * {
            outline: 0px solid transparent;
        }

        html, body {
            padding: 10px 0;
            margin: 0;
        }

        html {
            height: 100%;
        }

        body {
            padding: 10px;
            min-height: 100%;
        }

        pre {
            white-space: pre-wrap; /* Since CSS 2.1 */
        }
    </style>
</head>
<body>
    <pre id="plaintext"></pre>
</body>
</html>
